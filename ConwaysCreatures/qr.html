<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Scanner</title>

<style>
.controls {
    position: sticky;
    bottom: 0;
    background: black;
    padding: 10px;
    display: flex;
    gap: 10px;
}
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial, sans-serif;
}

video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

#mainMenu {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

#battleField {
    display: none;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

#result {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.8);
    padding: 20px;
    font-size: 22px;
    box-sizing: border-box;
    word-wrap: break-word;
}
.divInner {
    display: inline-block; /* Essential: allows side-by-side + box styling */
    width: 10px; 
    height: 10px;
    border: 2px solid #ccc; 
    vertical-align: top;   /* Prevents weird spacing issues with text */
    box-sizing: border-box; /* Highly recommended: keeps the 2px border INSIDE the 20px width */
    font-size: 8px;        /* Smaller font so the coordinates fit in 20px */
}

/* Ensure the container is wide enough for 5 items (5 * 20px) */
.container {
    width: 1000px;
    line-height: 0;        /* Removes extra vertical spacing between rows */
}
</style>
</head>
<body>
<div id="mainMenu">
    <button onclick="scanQR()">カード追加</button>
    <button onclick="initBattle()">クリーチャーをフィールドに置く</button>
    <div id="cards"></div>
</div>
<div id="battleField"></div>
<video id="video" autoplay playsinline></video>
<div id="result">Starting camera...</div>

<script>
var creatures={}
creatures.Glider1=[
"　■　",
"　　■",
"■■■"
];
creatures.gun1=[
"　■　",
"■■■",
"　■　"
];

var maxCardCount=0;
var currentCardNumber=0;

var currentSelectedCreture=null;
var placingCretures=false;
const cards = document.getElementById("cards");
const battleFieldDiv = document.getElementById("battleField");
const mainMenuDIV = document.getElementById("mainMenu");
function initBattle() {
    //initfield
    mainMenuDIV.style.display = "none";
    battleFieldDiv.style.display = "block";
    var width = 40;
    var height = 60;
    var xc, yc;
    var htmlOutput = '<div class="container">';

    // Corrected loop conditions
    for (yc = 0; yc < height; yc++) {
        for (xc = 0; xc < width; xc++) {
            //htmlOutput += "<div class='divInner' onclick='handleClick(this.id)' id='x" + xc + ",y" + yc + "'>" + xc + "," + yc + "</div>";
            htmlOutput += "<div class='divInner' onclick='handleClick(this.id)' id='x" + xc + ",y" + yc + "'>　</div>";
        } 
        htmlOutput += "<br>"; // Use <br> for line breaks, consider using CSS for layout
    }

    htmlOutput += '</div>';
    htmlOutput += `
<div class="controls">
    <button onclick="rotateCreture()">回転</button>
    <button onclick="startBattle()">バットル・スタート</button>
</div>
`;
    battleFieldDiv.innerHTML = htmlOutput; // Assign the full string once
   //resultDiv.style.display = "none";
    //video.style.display = "none";
    
    placeConwaysCreatures();

}
function getCardMatrix() {
    const cardName = p1deck[currentCardNumber].creatureName;
    return creatures[cardName];
}
//currentSelectedCreture=creatures.glider1;
function placeConwaysCreatures() {
    //getNextCreture()
    
    //currentSelectedCreture.center.width=Math.round(currentSelectedCreture[0].length/2);
    //currentSelectedCreture.center.height=Math.round(currentSelectedCreture.length/2);
    currentSelectedCreture.width=currentSelectedCreture[0].length;
    currentSelectedCreture.height=currentSelectedCreture.length;

    placingCretures=true;
}
function canPlaceCreature(creature, startX, startY) {
    for (let yc = 0; yc < creature.length; yc++) {
        for (let xc = 0; xc < creature[0].length; xc++) {

            const char = creature[yc][xc];

            // ✅ only care about solid pixels
            if (char !== "■") continue;

            const targetX = startX + xc;
            const targetY = startY + yc;

            const cell = document.getElementById('x' + targetX + ',y' + targetY);

            // out of bounds
            if (!cell) return false;

            // ✅ only block if target ALSO has a ■
            if (cell.innerHTML === "■") {
                return false;
            }
        }
    }
    return true;
}
function handleClick(id) {
    currentSelectedCreture=getCardMatrix()
    currentCardNumber++;
    if(currentCardNumber==maxCardCount){
        startBattle();
    }    
    const matches = id.match(/\d+/g);
    const numbers = matches.map(Number);

    const clickedX = numbers[0];
    const clickedY = numbers[1];

    // 🚨 check BEFORE placing
    if (!canPlaceCreature(currentSelectedCreture, clickedX, clickedY)) {
        alert("Cannot place here! it is overlapping with other creature!");
        return;
    }

    // ✅ place only if valid
    for (let yc = 0; yc < currentSelectedCreture.length; yc++) {
        for (let xc = 0; xc < currentSelectedCreture[0].length; xc++) {

            const targetX = clickedX + xc;
            const targetY = clickedY + yc;

            const cell = document.getElementById('x' + targetX + ',y' + targetY);

            if (cell) {
                cell.innerHTML = currentSelectedCreture[yc][xc];
            }
        }
    }
}
function rotateCreature90(creature) {
    const height = creature.length;
    const width = creature[0].length;

    const result = [];

    for (let x = 0; x < width; x++) {
        let newRow = "";
        for (let y = height - 1; y >= 0; y--) {
            newRow += creature[y][x];
        }
        result.push(newRow);
    }
    return result;
}
function rotateCreture() {
    currentSelectedCreture=rotateCreature90(currentSelectedCreture);
    // update dimensions
    currentSelectedCreture.width = currentSelectedCreture[0].length;
    currentSelectedCreture.height = currentSelectedCreture.length;
    alert(currentSelectedCreture.join("\n"))//prints the current creature rotation in alert
}
function startBattle(){
    alert("not implemented yet");
}
var p1deck=[];
var p2deck=[];
function scanQR() {
    const mainMenuDIV = document.getElementById("mainMenu");
    const video = document.getElementById("video");
    const resultDiv = document.getElementById("result");
    mainMenuDIV.style.display = "none";
    if (!("BarcodeDetector" in window)) {
        //resultDiv.innerText = "BarcodeDetector not supported.";
        resultDiv.innerText = "PLEASE RUNT HIS ON AN MODERN ANDROID DEVICE.";
    } else {

        const barcodeDetector = new BarcodeDetector({ formats: ["qr_code"] });

        navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        })
        .then(stream => {
            video.srcObject = stream;

            video.onloadedmetadata = () => {
                video.play();
                resultDiv.innerText = "Scanning...";
                requestAnimationFrame(scanFrame);
            };
        })
        .catch(err => {
            resultDiv.innerText = "Camera error: " + err.message;
        });

        function scanFrame() {

            if (video.readyState >= 2) {

                barcodeDetector.detect(video)
                .then(barcodes => {
                    if (barcodes.length > 0) {
                        //resultDiv.innerText = "QR Result:\n" + barcodes[0].rawValue;
                        //check for validity
                        const cards = document.getElementById("cards");
                        var cardName=barcodes[0].rawValue;
                        
                        switch(cardName) {
                            case "gun1":
                                console.log("You attack the enemy!");
                                break;

                            case "Glider1":
                                console.log("You defend yourself!");
                                break;

                            default:
                                alert("invalid card!");
                                mainMenuDIV.style.display = "block";
                                return
                        }
                        cards.innerHTML=cards.innerHTML+"<div id='"+maxCardCount+"'>ID:"+maxCardCount+"Name:"+cardName+"<img src='images/cards/"+cardName+".png' height=100 width=70></div>"
                        p1deck[maxCardCount]={}
                        p1deck[maxCardCount].creatureName=cardName
                        maxCardCount++;
                        //resultDiv.style.display = "none";
                        //video.style.display = "none";
                        mainMenuDIV.style.display = "block";
                        

                    } else {
                        requestAnimationFrame(scanFrame);
                    }
                })
                .catch(err => {
                    resultDiv.innerText = "Scan error: " + err.message;
                });

            } else {
                requestAnimationFrame(scanFrame);
            }
        }
    }
}
</script>

</body>
</html>
